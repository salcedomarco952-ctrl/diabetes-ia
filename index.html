<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IA Diabetes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>Diagnostico precoz de diabetes con IA</h1>
    <p class="subtitulo">Sistema web con datos manuales y hardware simulado.</p>

    <section class="formulario">
      <h2>Datos del paciente</h2>

      <label>Edad
        <input id="edad" type="number" value="45" min="18" max="100">
      </label>

      <label>Glucosa (mg/dL)
       <input id="glucosa" type="number" value="120" min="50" max="500">
      </label>

      <label>Presion arterial
        <input id="presion" type="number" value="130" min="70" max="250">
      </label>

      <label>Índice de masa corporal
        <input id="imc" type="number" value="28" min="10" max="70">
      </label>

      <label class="check">
        <input id="antecedentes" type="checkbox">
        Antecedentes familiares
      </label>

      <label class="check">
        <input id="sedentarismo" type="checkbox">
        Sedentarismo
      </label>

<label class="check">
  <input id="muchaSed" type="checkbox">
  Mucha sed
</label>

<label class="check">
  <input id="orinaFrecuente" type="checkbox">
  Orina frecuente
</label>

<label class="check">
  <input id="perdidaPeso" type="checkbox">
  Perdida de peso inexplicable
</label>

<label class="check">
  <input id="cansancio" type="checkbox">
  Cansancio excesivo
</label>

      <div class="botones">
        <button onclick="diagnosticarManual()">Diagnosticar</button>
        <button class="secundario" onclick="usarSimulador()">Usar hardware simulado</button>
      </div>
    </section>

    <section id="resultado" class="resultado">
      <h2>Resultado</h2>
      <p>Ingresa los datos y presiona diagnosticar.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
